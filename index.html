<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스포츠관광 모의고사</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header card">
      <div class="header-main">
        <div>
          <p class="eyebrow">핵심 빈출 정리</p>
          <h1>스포츠관광 모의고사</h1>
        </div>
        <div class="header-actions">
          <label class="subject-select">
            <span class="sr-only">범위 선택</span>
            <select id="scopeSelect" aria-label="범위 선택">
              <option value="all">전범위</option>
              <option value="theory-greece">이론·그리스</option>
              <option value="europe">유럽 국가별</option>
            </select>
          </label>
          <button id="shuffleBtn" class="ghost-btn" type="button">문제 섞기</button>
        </div>
      </div>

      <nav class="tabs" aria-label="문항 탭">
        <button class="tab is-active" data-mode="10" type="button">10문항</button>
        <button class="tab" data-mode="20" type="button">20문항</button>
        <button class="tab" data-mode="40" type="button">40문항</button>
        <button class="tab" data-mode="wrong" type="button">많이 틀리는 문제</button>
      </nav>
    </header>

    <main class="main-layout">
      <section class="question-panel card">
        <div class="question-meta">
          <span class="meta-pill" id="questionBadge">핵심 문제</span>
          <span class="meta-sub" id="questionSub">전범위 핵심 문항</span>
        </div>

        <div class="question-wrap" id="questionWrap">
          <h2 class="question-title" id="questionTitle"></h2>
          <div class="option-list" id="optionList"></div>
          <div class="explanation" id="explanationBox" hidden>
            <div class="explanation-head">
              <span class="explanation-badge" id="resultBadge"></span>
              <strong id="answerText"></strong>
            </div>
            <p id="explanationText"></p>
          </div>
        </div>

        <div class="panel-bottom">
          <div class="progress-text"><span id="currentIndex">1</span> / <span id="totalCount">10</span></div>
          <div class="panel-buttons">
            <button id="prevBtn" class="ghost-btn" type="button">이전</button>
            <button id="nextBtn" class="primary-btn" type="button">다음</button>
          </div>
        </div>
      </section>

      <aside class="side-panel card">
        <section class="summary-box">
          <h3>현재 세트 현황</h3>
          <div class="summary-grid">
            <div>
              <span class="summary-label">정답</span>
              <strong id="correctCount">0</strong>
            </div>
            <div>
              <span class="summary-label">오답</span>
              <strong id="wrongCount">0</strong>
            </div>
            <div>
              <span class="summary-label">미응답</span>
              <strong id="remainingCount">10</strong>
            </div>
            <div>
              <span class="summary-label">정답률</span>
              <strong id="accuracyCount">0%</strong>
            </div>
          </div>
        </section>

        <section class="navigator-box">
          <div class="navigator-head">
            <h3>문항 이동</h3>
            <button id="resetWrongBtn" class="text-btn" type="button">오답 기록 초기화</button>
          </div>
          <div class="navigator-grid" id="navigatorGrid"></div>
        </section>
      </aside>
    </main>

    <section class="result-panel card" id="resultPanel" hidden>
      <h2>세트 풀이 완료</h2>
      <p id="resultSummary"></p>
      <div class="result-actions">
        <button id="retrySetBtn" class="primary-btn" type="button">같은 세트 다시 풀기</button>
        <button id="reviewWrongBtn" class="ghost-btn" type="button">오답만 다시 보기</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
